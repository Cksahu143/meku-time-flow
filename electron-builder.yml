appId: com.edas.app
productName: EDAS
copyright: Copyright © 2026 Charukrishna Sahu

npmRebuild: false
asar: true

directories:
  buildResources: build
  output: electron-dist

files:
  - dist/**/*
  - electron/**/*
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!public/**/*"
  - "!electron-release/**/*"
  - "!.github/**/*"

# ─────────────────────────────────────────────────────────────────────────────
# macOS — universal = Intel (x64) + Apple Silicon (arm64) in one file
# ─────────────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.education
  hardenedRuntime: false
  gatekeeperAssess: false
  icon: build/favicon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
    - target: pkg
      arch:
        - universal

dmg:
  title: "EDAS"
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ─────────────────────────────────────────────────────────────────────────────
# Windows — x64 + ia32 so old 32-bit machines can run it.
# Portable = single .exe, no install, runs from USB or anywhere.
# ─────────────────────────────────────────────────────────────────────────────
win:
  icon: build/favicon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
        - ia32

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EDAS

# ─────────────────────────────────────────────────────────────────────────────
# Linux — AppImage runs on any distro with no install.
# deb for Ubuntu/Debian, rpm for Fedora/RHEL, tar.gz as raw fallback.
# armv7l covers old 32-bit ARM (Raspberry Pi 2/3, etc.)
# ─────────────────────────────────────────────────────────────────────────────
linux:
  category: Education
  icon: build/favicon.icns
  maintainer: Charukrishna Sahu <charukrishna.sahu@gmail.com>
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
        - armv7l
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
        - armv7l

publish:
  provider: github
  owner: Cksahu143
  repo: meku-time-flow
  releaseType: release
