name: Notify edas-home on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger edas-home manifest update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.EDAS_HOME_PAT }}" \
            https://api.github.com/repos/Cksahu143/edas-home/dispatches \
            -d '{"event_type":"release-published"}'
