name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Mac + Windows — same matrix structure you already had, just Windows now
  # builds both x64 and ia32 (+ portable) via the electron-builder.yml config
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Electron build dependencies
        run: npm install --save-dev electron electron-builder

      - name: Build web app
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        # No arch flag — electron-builder.yml handles x64 + ia32 + portable
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EDAS-${{ matrix.platform }}
          path: |
            electron-dist/*.dmg
            electron-dist/*.zip
            electron-dist/*.pkg
            electron-dist/*.exe
            electron-dist/*.msi
            electron-dist/*.yml
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Linux — separate job because it needs the ARM cross-compiler installed
  # Builds: AppImage, deb, rpm, tar.gz across x64 + arm64 + armv7l
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install ARM cross-compilation toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            rpm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Electron build dependencies
        run: npm install --save-dev electron electron-builder

      - name: Build web app
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build Electron app (Linux)
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_armv7l: arm-linux-gnueabihf-gcc
          CXX_armv7l: arm-linux-gnueabihf-g++

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EDAS-linux
          path: |
            electron-dist/*.AppImage
            electron-dist/*.deb
            electron-dist/*.rpm
            electron-dist/*.tar.gz
            electron-dist/*.yml
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Release — waits for all 3 builds, then publishes everything to GitHub
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.pkg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
